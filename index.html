<style>
:root{
  --bg:#0b0b0e;
  --panel:#121218;
  --panel2:#17171f;
  --line:#26262e;
  --text:#d8d5cf;
  --muted:#7a7873;
  --blood:#a4232b;
  --blood-bright:#d13a44;
  --gold:#b99754;
  --gold-dim:#6e5a33;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans TC',sans-serif;
  min-height:100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(164,35,43,0.06), transparent),
    repeating-linear-gradient(0deg, transparent 0 2px, rgba(255,255,255,0.006) 2px 4px);
}
.wrap{max-width:860px;margin:0 auto;padding:0 16px calc(60px + env(safe-area-inset-bottom));}

/* ---------- 封面 ---------- */
.hero{position:relative;margin:0 -16px 26px;overflow:hidden;border-bottom:1px solid var(--line);}
.hero img{display:block;width:100%;max-height:74vh;object-fit:cover;object-position:center 20%;filter:saturate(.92) contrast(1.04);}
.hero::after{
  content:'';position:absolute;inset:0;
  background:
    linear-gradient(180deg, rgba(11,11,14,.55) 0%, transparent 22%, transparent 45%, rgba(11,11,14,.92) 82%, var(--bg) 100%),
    linear-gradient(90deg, rgba(11,11,14,.35), transparent 30%, transparent 70%, rgba(11,11,14,.35));
}
.hero .inner{position:absolute;left:0;right:0;bottom:0;z-index:2;padding:0 24px 26px;text-align:center;}
.hero .eyebrow{font-size:10px;letter-spacing:.55em;text-indent:.55em;color:var(--gold);margin-bottom:10px;}
.hero h1{font-family:'Noto Serif TC',serif;font-weight:900;font-size:42px;letter-spacing:.22em;text-indent:.22em;color:var(--text);text-shadow:0 2px 24px rgba(0,0,0,.9);}
.hero h1 span{color:var(--blood-bright);}
.hero .sub{font-size:12px;color:var(--muted);letter-spacing:.3em;text-indent:.3em;margin-top:10px;}
.hero .stamp{
  position:absolute;right:20px;top:20px;z-index:2;
  border:2px solid var(--blood);color:var(--blood-bright);
  font-family:'Noto Serif TC',serif;font-weight:700;font-size:13px;letter-spacing:.35em;
  padding:5px 8px 5px 12px;transform:rotate(-7deg);opacity:.9;user-select:none;
  background:rgba(11,11,14,.35);
}
@media(max-width:560px){.hero h1{font-size:32px;}.hero img{max-height:64vh;}}

header#slimHeader{
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--bg);
  padding:18px 0 14px;
  border-bottom:1px solid var(--line);
  margin-bottom:18px;
  box-shadow: 0 4px 12px rgba(0,0,0,.4);
}
header#slimHeader .eyebrow{font-size:11px;letter-spacing:.5em;color:var(--muted);margin-bottom:6px;}
header#slimHeader h1{font-family:'Noto Serif TC',serif;font-weight:900;font-size:20px;letter-spacing:.12em;}
header#slimHeader h1 span{color:var(--blood-bright);}

/* ---------- 卡片與表單 ---------- */
.card{background:var(--panel);border:1px solid var(--line);padding:24px;margin-bottom:18px;}
.card h2{font-family:'Noto Serif TC',serif;font-size:16px;letter-spacing:.3em;color:var(--gold);margin-bottom:16px;font-weight:600;}
label{display:block;font-size:12px;letter-spacing:.2em;color:var(--muted);margin:14px 0 6px;}
input[type=text],input[type=password],textarea{
  width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);
  padding:10px 12px;font-size:14px;font-family:'Noto Sans TC',sans-serif;transition:border-color .2s;
}
input:focus,textarea:focus{outline:none;border-color:var(--gold-dim);}
textarea{resize:vertical;min-height:64px;}
.hint{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.6;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:560px){.row{grid-template-columns:1fr;}}
button{cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.btn-main{
  width:100%;margin-top:22px;padding:14px;
  background:transparent;border:1px solid var(--blood);color:var(--blood-bright);
  font-size:15px;letter-spacing:.5em;text-indent:.5em;transition:all .25s;font-weight:500;
}
.btn-main:hover:not(:disabled){background:var(--blood);color:#fff;}
.btn-main:disabled{opacity:.4;cursor:wait;}
.btn-ghost{
  padding:10px 18px;background:transparent;border:1px solid var(--line);color:var(--muted);
  font-size:12px;letter-spacing:.2em;transition:all .2s;
}
.btn-ghost:hover{border-color:var(--muted);color:var(--text);}

/* ---------- 續玩橫幅 ---------- */
.resume{
  border:1px solid var(--gold-dim);background:var(--panel2);padding:18px 20px;margin-bottom:18px;
}
.resume .t{font-family:'Noto Serif TC',serif;color:var(--gold);letter-spacing:.2em;font-size:15px;margin-bottom:8px;}
.resume p{font-size:12.5px;color:var(--muted);line-height:1.8;margin-bottom:14px;}
.resume .btns{display:flex;gap:10px;flex-wrap:wrap;}
.resume .go{
  padding:10px 26px;background:transparent;border:1px solid var(--gold);color:var(--gold);
  letter-spacing:.3em;text-indent:.3em;font-size:13px;transition:all .2s;
}
.resume .go:hover{background:var(--gold);color:#0b0b0e;}

/* ---------- 狀態欄 ---------- */
.status{
  position:sticky;
  top: 72px;          /* 放在 slimHeader 下面，保持置頂可見 */
  z-index: 40;
  background:rgba(11,11,14,.96);
  backdrop-filter:blur(8px);
  border:1px solid var(--line);
  border-top:2px solid var(--blood);
  padding:14px 18px;
  margin-bottom:20px;
  display:grid;
  grid-template-columns:1.2fr 1fr 1fr;
  gap:14px;
  box-shadow: 0 6px 16px rgba(0,0,0,.45);
}
@media(max-width:560px){.status{grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 12px;}}
.stat .k{font-size:10px;letter-spacing:.35em;color:var(--muted);margin-bottom:4px;}
@media(max-width:560px){.stat .k{letter-spacing:.15em;}}
.stat .v{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:600;}
.stat .v.gold{color:var(--gold);}
.stat .v.blood{color:var(--blood-bright);}
.bar{height:3px;background:var(--line);margin-top:6px;position:relative;overflow:hidden;}
.bar i{position:absolute;left:0;top:0;bottom:0;background:var(--blood);transition:width .6s;}
.delta{font-size:11px;color:var(--muted);margin-left:6px;font-family:'Noto Sans TC',sans-serif;font-weight:400;}

/* ---------- 故事 ---------- */
#feed{margin-bottom:20px;}
.entry{border-left:2px solid var(--line);padding:4px 0 4px 18px;margin-bottom:26px;animation:fade .5s;}
.entry.player{border-left-color:var(--gold-dim);}
.entry .who{font-size:10px;letter-spacing:.4em;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.entry.player .who{color:var(--gold);}
.entry .who button{
  background:transparent;border:1px solid var(--line);color:var(--muted);
  font-size:10px;letter-spacing:.15em;padding:3px 10px;transition:all .2s;
}
.entry .who button:hover:not(:disabled){border-color:var(--gold-dim);color:var(--gold);}
.entry .who button:disabled{opacity:.3;}
.story{font-family:'Noto Serif TC',serif;font-size:15px;line-height:2.1;white-space:pre-wrap;}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.editbox textarea{margin-bottom:8px;font-size:14px;}
.editbox .btns{display:flex;gap:8px;}
.editbox .btns button{font-size:12px;letter-spacing:.2em;padding:7px 16px;background:transparent;transition:all .2s;}
.editbox .ok{border:1px solid var(--gold-dim);color:var(--gold);}
.editbox .ok:hover{background:var(--gold-dim);color:#fff;}
.editbox .no{border:1px solid var(--line);color:var(--muted);}

/* ---------- 角色卡 ---------- */
.charcard{background:var(--panel2);border:1px solid var(--gold-dim);padding:16px 18px;margin:0 0 26px 18px;position:relative;animation:fade .5s;}
.charcard::before{content:'新登場人物';position:absolute;top:-9px;left:14px;background:var(--panel2);color:var(--gold);font-size:10px;letter-spacing:.3em;padding:0 8px;}
.charcard .cname{font-family:'Noto Serif TC',serif;font-size:18px;font-weight:700;color:var(--gold);margin-bottom:8px;}
.charcard .cline{font-size:12.5px;line-height:1.9;color:var(--text);}
.charcard .cline b{color:var(--muted);font-weight:400;margin-right:8px;font-size:11px;letter-spacing:.15em;}

/* ---------- 行動輸入 ---------- */
#actionArea{border-top:1px solid var(--line);padding-top:18px;}
#actionArea .k{font-size:10px;letter-spacing:.4em;color:var(--muted);margin-bottom:10px;}
#actionArea textarea{min-height:76px;font-size:14px;line-height:1.8;}
.actRow{display:flex;gap:10px;margin-top:10px;align-items:stretch;}
.actRow button{
  flex:1;padding:12px;background:transparent;border:1px solid var(--blood);color:var(--blood-bright);
  letter-spacing:.4em;text-indent:.4em;font-size:14px;transition:all .2s;
}
.actRow button:hover:not(:disabled){background:var(--blood);color:#fff;}
.actRow button:disabled{opacity:.35;}

/* ---------- 其他 ---------- */
#loading{display:none;text-align:center;padding:24px;color:var(--muted);font-size:12px;letter-spacing:.4em;}
#loading.on{display:block;animation:pulse 1.4s infinite;}
@keyframes pulse{0%,100%{opacity:.35;}50%{opacity:1;}}
#error{display:none;border:1px solid var(--blood);color:var(--blood-bright);padding:12px 16px;font-size:13px;margin-bottom:16px;line-height:1.7;}
#error button{margin-top:8px;background:transparent;border:1px solid var(--blood);color:var(--blood-bright);padding:5px 16px;font-size:12px;letter-spacing:.2em;}
.gameover{text-align:center;padding:70px 20px;animation:fade .8s;}
.gameover .big{
  font-family:'Noto Serif TC',serif;font-size:46px;font-weight:900;letter-spacing:.2em;
  color:var(--blood-bright);border:3px solid var(--blood);display:inline-block;
  padding:16px 30px 16px 40px;transform:rotate(-4deg);margin-bottom:28px;
}
.gameover p{color:var(--muted);line-height:2;font-size:14px;}
.gameover .btns{margin-top:30px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.gameover button{padding:12px 30px;background:transparent;border:1px solid var(--line);color:var(--text);letter-spacing:.3em;font-size:13px;}
.toolbar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:14px;}
.hidden{display:none;}
</style>
</head>
<body>

/* ================= 數值計算 ================= */
function computeStats(uptoTurns){
  let favor=0, susp=50, trusted=false;
  for(let i=0;i<uptoTurns && i<S.turns.length;i++){
    const r = S.turns[i].result;
    if(!r) continue;
    if(typeof r.favor==='number') favor = r.favor;
    if(!trusted){
      if(r.suspicion===-1){ trusted=true; }
      else if(typeof r.suspicion==='number') susp = Math.max(0,Math.min(100,r.suspicion));
      if(favor>200) trusted=true;
    }
  }
  return {favor, suspicion:susp, trusted};
}

function buildHistory(){

  const turns = S.turns;
  let idxs = turns.map((_,i)=>i);
  if(turns.length>12){

  }
  const msgs=[];
  idxs.forEach(i=>{
    const t = turns[i];
    const content = (i===0) ? t.userText
      : '玩家的行動／台詞：'+t.userText+'\n請接續劇情，依此行動以擬真難度調整好感度與懷疑度。';
    msgs.push({role:'user',content});
    if(t.result) msgs.push({role:'assistant',content:JSON.stringify(t.result)});
  });
  return msgs;
}

async function callAPI(){
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':getKey(),
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:3200,
      system:buildSystemPrompt(),
      messages:buildHistory()
    })
  });
  if(!res.ok){
    const t = await res.text();
    throw new Error('API錯誤 '+res.status+'：'+t.slice(0,200));
  }
  const data = await res.json();
  const text = data.content.map(b=>b.type==='text'?b.text:'').join('');
  let t = text.trim().replace(/^```(json)?/,'').replace(/```$/,'').trim();
  const s0 = t.indexOf('{'), e0 = t.lastIndexOf('}');
  if(s0===-1||e0===-1) throw new Error('無法解析模型回覆');
  return JSON.parse(t.slice(s0,e0+1));
}

  document.getElementById('hero').classList.add('hidden');
  document.getElementById('slimHeader').classList.remove('hidden');
  document.getElementById('game').classList.remove('hidden');
}

async function advance(){
  if(busy) return;
  busy = true;
  setInputEnabled(false);
  document.getElementById('loading').classList.add('on');
  hideError();

  // 標記背景生成中（關閉頁面後重開仍會自動繼續）
  try {
    localStorage.setItem(PENDING_KEY, JSON.stringify({
      turnIndex: S.turns.length - 1,
      timestamp: Date.now()
    }));
  } catch(e){}

  try{
    const r = await callAPI();
    S.turns[S.turns.length-1].result = r;
    save();
    renderAll();
    // 生成成功，清除背景標記
    try { localStorage.removeItem(PENDING_KEY); } catch(e){}
  }catch(err){
    showError(err.message);
    // 錯誤時保留 pending，方便重試或下次自動繼續
  }finally{
    document.getElementById('loading').classList.remove('on');
    busy = false;
    setInputEnabled(true);
  }
}

function sendAction(){
  if(busy) return;
  const v = document.getElementById('freeInput').value.trim();
  if(!v) return;
  const last = S.turns[S.turns.length-1];
  if(last && !last.result){ return; }  // 上一回合還沒回覆
  document.getElementById('freeInput').value='';
  S.turns.push({userText:v, result:null});
  save();
  renderAll();
  advance();
}

/* 編輯第i回合的玩家輸入並重新生成（會捨棄其後所有劇情） */
function editTurn(i){
  if(busy) return;
  const entry = document.getElementById('pentry-'+i);
  if(!entry || entry.querySelector('.editbox')) return;
  const old = S.turns[i].userText;
  const box = document.createElement('div');
  box.className='editbox';
  box.innerHTML = `<textarea></textarea>
    <div class="btns">
      <button class="ok">重新生成</button>
      <button class="no">取消</button>
    </div>
    <div class="hint">確認後，這一步之後的所有劇情與數值都會捨棄並重寫。</div>`;
  box.querySelector('textarea').value = old;
  entry.querySelector('.story').classList.add('hidden');
  entry.appendChild(box);
  box.querySelector('.no').onclick = ()=>{ box.remove(); entry.querySelector('.story').classList.remove('hidden'); };
  box.querySelector('.ok').onclick = ()=>{
    const nv = box.querySelector('textarea').value.trim();
    if(!nv) return;
    S.turns = S.turns.slice(0, i);
    S.turns.push({userText:nv, result:null});
    save();
    renderAll();
    advance();
  };
}

/* 重新生成最新一頁劇情（輸入不變） */
function regenLast(){
  if(busy) return;
  const i = S.turns.length-1;
  if(i<0) return;
  S.turns[i].result = null;
  save();
  renderAll();
  advance();
}

/* 從遊戲結束回到上一步 */
function undoLastTurn(){
  if(S.turns.length<=1){ wipeSave(); return; }
  S.turns = S.turns.slice(0, S.turns.length-1);
  save();
  renderAll();
}

/* ================= 畫面 ================= */
function renderAll(){
  const feed = document.getElementById('feed');
  feed.innerHTML='';
  let page=0;
  const lastResultIdx = (()=>{ let k=-1; S.turns.forEach((t,i)=>{if(t.result)k=i;}); return k; })();

  S.turns.forEach((t,i)=>{
    if(i>0){
      const pe = document.createElement('div');
      pe.className='entry player'; pe.id='pentry-'+i;
      pe.innerHTML = `<div class="who"><span>你的行動</span><button>✎ 編輯重寫</button></div><div class="story"></div>`;
      pe.querySelector('.story').textContent = t.userText;
      pe.querySelector('button').onclick = ()=>editTurn(i);
      feed.appendChild(pe);
    }
    if(t.result){
      page++;
      const div = document.createElement('div');
      div.className='entry';
      const regen = (i===lastResultIdx) ? '<button>↻ 重寫本頁</button>' : '';
      div.innerHTML = `<div class="who"><span>第 ${page} 頁</span>${regen}</div><div class="story"></div>`;
      const storyEl = div.querySelector('.story');
      const fullStory = t.result.story || '';

      if (i === lastResultIdx && !storyEl.dataset.typed) {
        // 最新一頁使用打字機效果（逐字顯示，感覺即時生成）
        typewriter(storyEl, fullStory, 7);   // 速度 7ms/字，相當快
      } else {
        storyEl.textContent = fullStory;
      }
      const rb = div.querySelector('button');
      if(rb) rb.onclick = regenLast;
      feed.appendChild(div);
      (t.result.newCharacters||[]).forEach(c=>{
        const cc = document.createElement('div');
        cc.className='charcard';
        cc.innerHTML = `
          <div class="cname"></div>
          <div class="cline"><b>年齡</b><span class="c1"></span></div>
          <div class="cline"><b>身分</b><span class="c2"></span></div>
          <div class="cline"><b>外貌</b><span class="c3"></span></div>
          <div class="cline"><b>其他</b><span class="c4"></span></div>`;
        cc.querySelector('.cname').textContent = c.name||'？';
        cc.querySelector('.c1').textContent = c.age||'不明';
        cc.querySelector('.c2').textContent = c.identity||'不明';
        cc.querySelector('.c3').textContent = c.appearance||'—';
        cc.querySelector('.c4').textContent = c.notes||'—';
        feed.appendChild(cc);
      });
    }
  });

  // 狀態欄
  const st = computeStats(S.turns.length);
  const lastR = lastResultIdx>=0 ? S.turns[lastResultIdx].result : null;
  document.getElementById('stMood').textContent = (lastR&&lastR.mood)||'—';
  const fc = (lastR && typeof lastR.favorChange==='number' && lastR.favorChange!==0)
    ? (lastR.favorChange>0?`（+${lastR.favorChange}）`:`（${lastR.favorChange}）`) : '';
  document.getElementById('stFavor').innerHTML = st.favor+`<span class="delta">${fc}</span>`;
  if(st.trusted){
    document.getElementById('stSuspicion').textContent='—';
    document.getElementById('suspBar').style.width='0%';
  }else{
    document.getElementById('stSuspicion').textContent = st.suspicion;
    document.getElementById('suspBar').style.width = st.suspicion+'%';
  }

  // 遊戲結束
  const over = !st.trusted && st.suspicion>=100;
  document.getElementById('gameover').classList.toggle('hidden', !over);
  document.getElementById('actionArea').classList.toggle('hidden', over || lastResultIdx<0);

  window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
}

function setInputEnabled(on){
  document.getElementById('freeBtn').disabled=!on;
  document.getElementById('freeInput').disabled=!on;
  document.querySelectorAll('.entry .who button').forEach(b=>b.disabled=!on);
}

function showError(msg){
  const e = document.getElementById('error');
  e.innerHTML='';
  e.appendChild(document.createTextNode('⚠ '+msg));
  const b = document.createElement('button');
  b.textContent='重試';
  b.onclick = ()=>{ hideError(); advance(); };
  e.appendChild(document.createElement('br'));
  e.appendChild(b);
  e.style.display='block';
}
function hideError(){ document.getElementById('error').style.display='none'; }

/* 打字機效果（逐字顯示，加快速度） */
function typewriter(element, fullText, speed = 8) {
  element.textContent = '';
  let i = 0;
  const timer = setInterval(() => {
    if (i < fullText.length) {
      element.textContent += fullText.charAt(i);
      i++;
      // 已移除自動捲動，讓玩家可以自由上下滑動觀看劇情
    } else {
      clearInterval(timer);
      element.dataset.typed = 'true';
    }
  }, speed);
}

/* ================= 初始化 ================= */
(function init(){
  try{
    const k = localStorage.getItem(KEY_KEY);
    if(k) document.getElementById('apiKey').value = k;

    // 預填記住的人設
    const ps = localStorage.getItem(PLAYER_SETTINGS_KEY);
    if(ps){
      const p = JSON.parse(ps);
      if(p.name) document.getElementById('pName').value = p.name;
      if(p.age) document.getElementById('pAge').value = p.age;
      if(p.personality) document.getElementById('pPersonality').value = p.personality;
      if(p.other) document.getElementById('pOther').value = p.other;
    }
  }catch(e){}
  const s = loadSave();
  if(s && s.turns && s.turns.length){
    const st = (()=>{ S=s; const r=computeStats(s.turns.length); S=null; return r; })();
    const pages = s.turns.filter(t=>t.result).length;
    document.getElementById('resumeInfo').textContent =
      `探員：${s.player.name}｜進度：第 ${pages} 頁｜好感 ${st.favor}｜懷疑 ${st.trusted?'—':st.suspicion}`;
    document.getElementById('resumeBox').classList.remove('hidden');
  }
})();
</script>
